<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Icon: scissors in rounded square -->
  <rect width="40" height="40" rx="10" fill="#4f46e5"/>

  <!-- Scissors: top blade -->
  <circle cx="11" cy="13" r="4.5" stroke="white" stroke-width="2.2" fill="none"/>
  <line x1="15" y1="16" x2="28" y2="21" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Scissors: bottom blade -->
  <circle cx="11" cy="27" r="4.5" stroke="white" stroke-width="2.2" fill="none"/>
  <line x1="15" y1="24" x2="28" y2="19" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Pivot dot -->
  <circle cx="20.5" cy="20" r="2" fill="white" opacity="0.9"/>

  <!-- Dotted cut lines -->
  <line x1="29" y1="16" x2="37" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.6"/>
  <line x1="29" y1="24" x2="37" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- Logotype -->
  <text x="50" y="27" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-size="20" font-weight="700" fill="#1e1b4b" letter-spacing="1">テシゴト</text>
</svg>
